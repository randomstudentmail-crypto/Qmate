<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5C35"/>
      <stop offset="100%" stop-color="#FF8A6A"/>
    </linearGradient>
  </defs>
  <!-- Rounded square bg -->
  <rect width="64" height="64" rx="15" fill="url(#g)"/>
  <!-- Inner highlight ring -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
  <!-- Q glyph — outer circle -->
  <circle cx="30" cy="28" r="14" fill="none" stroke="white" stroke-width="4.5"/>
  <!-- Q tail stroke -->
  <line x1="39" y1="37" x2="48" y2="48" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
</svg>
